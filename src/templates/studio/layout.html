<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="shortcut icon"
            href="favicon.svg"
            sizes="any"
            type="image/svg+xml"
        />
    </head>
    <body class="size-full flex flex-row bg-slate-100 text-black">
        <aside
            class="flex flex-col border-r border-slate-400 bg-slate-200 shadow-md"
        >
            <header
                class="bg-white text-black flex flex-row items-center justify-start h-12 px-4 py-2 border-b border-slate-400 shadow-md"
            >
                <img src="slidesk.svg" class="w-8 h-8" alt="SliDesk Studio" />
                <p class="font-bold pl-4">Studio</p>
            </header>
            <section id="previews" class="grow overflow-y-scroll"></section>
        </aside>
        <main class="grow flex flex-col">
            <header
                class="h-12 bg-white border-b border-slate-400 shadow-md flex flex-row justify-between items-center px-2"
            >
                <label class="mx-2 text-xs text-black">
                    Classes:
                    <input
                        id="classes"
                        class="ml-2 border-b h-8 w-48 text-black"
                    />
                </label>
                <div class="flex gap-1.5">
                    <button
                        id="add-heading"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors cursor-pointer disabled:opacity-25 disabled:cursor-default"
                        type="button"
                        disabled
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M7 12h10"/><path d="M7 5v14"/><path d="M17 5v14"/><path d="M15 19h4"/><path d="M15 5h4"/><path d="M5 19h4"/><path d="M5 5h4"/></svg>
                    </button>
                    <button
                        id="add-paragraph"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors cursor-pointer disabled:opacity-25 disabled:cursor-default"
                        type="button"
                        disabled
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M13 4v16"/><path d="M17 4v16"/><path d="M19 4h-9.5a4.5 4.5 0 0 0 0 9h3.5"/></svg>
                    </button>
                    <button
                        id="add-image"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors cursor-pointer disabled:opacity-25 disabled:cursor-default"
                        type="button"
                        disabled
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M15 8h.01"/><path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12"/><path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5"/><path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3"/></svg>
                    </button>
                    <button
                        id="add-variable"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors cursor-pointer disabled:opacity-25 disabled:cursor-default"
                        type="button"
                        disabled
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M5 4c-2.5 5 -2.5 10 0 16m14 -16c2.5 5 2.5 10 0 16m-10 -11h1c1 0 1 1 2.016 3.527c.984 2.473 .984 3.473 1.984 3.473h1"/><path d="M8 16c1.5 0 3 -2 4 -3.5s2.5 -3.5 4 -3.5"/></svg>
                    </button>
                </div>
            </header>
            <section
                id="workbench"
                class="grow flex items-center justify-center shadow-lg"
            ></section>
            <footer
                class="h-12 bg-white border-t border-slate-400 shadow-md text-xs flex flex-row justify-between items-center px-2"
            >
                <button
                    id="toggle-notes"
                    class="inline-flex items-center gap-1.5 bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors cursor-pointer disabled:opacity-25 disabled:cursor-default"
                    type="button"
                    disabled
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"/><path d="M13.5 6.5l4 4"/></svg>
                    Notes
                </button>
            </footer>
        </main>
        <aside
            id="css-panel"
            class="w-60 bg-white border-l border-slate-400 shadow-md flex flex-col text-xs overflow-y-auto"
        >
            <section id="css-element" class="hidden">
                <header class="h-8 bg-slate-100 border-b border-slate-400 flex items-center px-3 font-semibold">
                    Element
                </header>
                <div class="p-3 space-y-2">
                    <label class="flex items-center justify-between">
                        Color
                        <input id="css-color" type="color" class="w-8 h-8 p-0 border rounded cursor-pointer" />
                    </label>
                    <label class="flex items-center justify-between">
                        Size
                        <select id="css-size" class="border rounded px-1 py-0.5 w-20">
                            <option value="">inherit</option>
                            <option>0.75rem</option><option>0.875rem</option><option>1rem</option>
                            <option>1.25rem</option><option>1.5rem</option><option>2rem</option>
                            <option>2.5rem</option><option>3rem</option><option>4rem</option>
                        </select>
                    </label>
                    <label class="flex items-center justify-between">
                        Weight
                        <select id="css-weight" class="border rounded px-1 py-0.5 w-20">
                            <option value="">inherit</option>
                            <option>normal</option><option>bold</option>
                            <option>100</option><option>200</option><option>300</option>
                            <option>400</option><option>500</option><option>600</option>
                            <option>700</option><option>800</option><option>900</option>
                        </select>
                    </label>
                    <label class="flex items-center justify-between">
                        Style
                        <select id="css-style" class="border rounded px-1 py-0.5 w-20">
                            <option value="">inherit</option>
                            <option>normal</option><option>italic</option>
                        </select>
                    </label>
                    <label class="flex items-center justify-between">
                        Align
                        <select id="css-align" class="border rounded px-1 py-0.5 w-20">
                            <option value="">inherit</option>
                            <option>left</option><option>center</option><option>right</option>
                        </select>
                    </label>
                    <label class="flex items-center justify-between">
                        Bg color
                        <span class="flex items-center gap-1">
                            <input id="css-el-bg" type="color" class="w-8 h-8 p-0 border rounded cursor-pointer" />
                            <button id="css-el-bg-clear" class="w-5 h-5 flex items-center justify-center text-xs rounded hover:bg-slate-200 cursor-pointer disabled:opacity-25 disabled:cursor-default" type="button" title="Clear background">✕</button>
                        </span>
                    </label>
                </div>
            </section>
            <section id="css-slide">
                <header class="h-8 bg-slate-100 border-b border-slate-400 flex items-center px-3 font-semibold">
                    Slide
                </header>
                <div class="p-3 space-y-2">
                    <label class="flex items-center justify-between">
                        Bg color
                        <input id="css-slide-bg" type="color" class="w-8 h-8 p-0 border rounded cursor-pointer" />
                    </label>
                    <label class="flex items-center justify-between">
                        Bg image
                        <input id="css-slide-img" type="file" accept="image/*" class="w-32 text-[0.6rem]" />
                    </label>
                </div>
            </section>
        </aside>
        <div
            id="image-modal"
            class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 text-black"
        >
            <div class="bg-white rounded-lg p-6 min-w-[400px] shadow-xl">
                <p class="text-lg font-bold mb-4">Insert Image</p>
                <input
                    id="img-src"
                    class="w-full mb-2"
                    type="file"
                    accept="image/*"
                />
                <div class="flex gap-2 mb-2">
                    <input
                        id="img-width"
                        class="w-1/2 border rounded px-2 py-1"
                        placeholder="Width"
                    />
                    <input
                        id="img-height"
                        class="w-1/2 border rounded px-2 py-1"
                        placeholder="Height"
                    />
                </div>
                <input
                    id="img-alt"
                    class="w-full border rounded px-2 py-1 mb-2"
                    placeholder="Alt text"
                />
                <input
                    id="img-caption"
                    class="w-full border rounded px-2 py-1 mb-2"
                    placeholder="Caption"
                />
                <label class="flex items-center gap-2 mb-4 text-sm">
                    <input id="img-hide-caption" type="checkbox" />
                    Hide caption
                </label>
                <div class="flex justify-end gap-2">
                    <button
                        id="img-cancel"
                        class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 cursor-pointer"
                    >
                        Cancel
                    </button>
                    <button
                        id="img-insert"
                        class="px-4 py-2 rounded bg-blue-500 hover:bg-blue-600 text-white cursor-pointer"
                    >
                        Insert
                    </button>
                </div>
            </div>
        </div>
        <div
            id="var-modal"
            class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 text-black"
        >
            <div class="bg-white rounded-lg p-6 min-w-[320px] shadow-xl">
                <p class="text-lg font-bold mb-4">Insert Variable</p>
                <select
                    id="var-select"
                    class="w-full border rounded px-2 py-1 mb-3"
                >
                    <option value="">-- Select existing --</option>
                </select>
                <input
                    id="var-input"
                    class="w-full border rounded px-2 py-1 mb-4"
                    placeholder="Or type a new variable name"
                />
                <div class="flex justify-end gap-2">
                    <button
                        id="var-cancel"
                        class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 cursor-pointer"
                    >
                        Cancel
                    </button>
                    <button
                        id="var-insert"
                        class="px-4 py-2 rounded bg-blue-500 hover:bg-blue-600 text-white cursor-pointer"
                    >
                        Insert
                    </button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
